<input type="text" id="name" placeholder="Your Name"><br><br>
<input type="text" id="item" placeholder="What do you want?"><br><br>
<input type="text" id="phone" placeholder="Your Phone Number"><br><br>

<button onclick="sendOrder()">Send Order on WhatsApp</button>

<script>
function sendOrder() {
  var name = document.getElementById("name").value;
  var item = document.getElementById("item").value;
  var phone = document.getElementById("phone").value;

  var message = "Name: " + name + "%0AItem: " + item + "%0APhone: " + phone;

  var url = "https://wa.me/918667639855?text=" + message;

  window.open(url, "_blank");
}
</script>
  <p>📞 Phone: 8667639855</p>
  <a class="btn" href="https://wa.me/918667639855">

  </a>

<script>
var images = [
  "https://images.unsplash.com/photo-1599785209707-28b7b0a4d0d2",
  "https://images.unsplash.com/photo-1608198093002-ad4e005484ec",
  "https://images.unsplash.com/photo-1588195538326-c5b1e9f80a1b"
];

var i = 0;

function slideShow() {
  document.getElementById("slide").src = images[i];
  i++;
  if(i >= images.length) { i = 0; }
  setTimeout(slideShow, 2000);
}

slideShow();
</script>
